name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate skills before releasing
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            python:3.12-slim \
            bash -lc "pip install --quiet pyyaml && python3 scripts/validate-skills.py && python3 -m unittest tests/test_validate_skills.py"

      - name: Create GitHub Release from changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { f = 1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "$GITHUB_REF_NAME" > release-notes.md
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
